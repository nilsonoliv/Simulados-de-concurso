             { id: 37, subject: "Administração", topic: "Lei 13.204/2014 (BA)", question: "A Lei Estadual 13.204/2014 dispõe sobre:", options: ["A) O plano de carreira dos professores.", "B) A estrutura organizacional da Administração Pública do Poder Executivo da Bahia.", "C) O trânsito em Salvador.", "D) A previdência dos servidores.", "E) O orçamento participativo."], correct: 1, explanation: "Gabarito: B. Lei específica da Bahia cobrada no edital." },
             { id: 38, subject: "Informática", topic: "Segurança", question: "O termo 'Phishing' refere-se a:", options: ["A) Um vírus que apaga arquivos.", "B) Uma técnica de engenharia social para roubar dados do usuário.", "C) Um software de edição de fotos.", "D) Uma peça do computador.", "E) Um tipo de backup."], correct: 1, explanation: "Gabarito: B. Phishing é a tentativa de 'pescar' senhas e dados através de e-mails ou sites falsos." },
             { id: 39, subject: "Administração", topic: "Organograma", question: "O organograma é a representação gráfica da:", options: ["A) Estrutura física do prédio.", "B) Estrutura organizacional formal.", "C) Rede de fofocas da empresa.", "D) Folha de pagamento.", "E) Fluxo de caixa."], correct: 1, explanation: "Gabarito: B. Representa a hierarquia e os departamentos." },
             { id: 40, subject: "Raciocínio Lógico", topic: "Conjuntos", question: "Se A = {1, 2, 3} e B = {3, 4, 5}, a interseção de A e B é:", options: ["A) {1, 2, 3, 4, 5}", "B) {3}", "C) {1, 2}", "D) {4, 5}", "E) Vazio"], correct: 1, explanation: "Gabarito: B. Interseção são os elementos comuns aos dois conjuntos." },
             { id: 41, subject: "Administração", topic: "Licitação", question: "A nova lei de licitações visa garantir, exceto:", options: ["A) Isonomia.", "B) Seleção da proposta mais vantajosa.", "C) Desenvolvimento nacional sustentável.", "D) Escolha do fornecedor amigo do gestor.", "E) Impessoalidade."], correct: 3, explanation: "Gabarito: D. Favorecimento pessoal é crime e viola a impessoalidade." },
             { id: 42, subject: "Direito Administrativo", topic: "Poderes", question: "O poder que a Administração tem de punir internamente seus servidores é o:", options: ["A) Poder de Polícia.", "B) Poder Disciplinar.", "C) Poder Hierárquico.", "D) Poder Normativo.", "E) Poder Vinculado."], correct: 1, explanation: "Gabarito: B. O poder disciplinar apura infrações e aplica penalidades funcionais." },
             { id: 43, subject: "ECA", topic: "Prioridade Absoluta", question: "O princípio da Prioridade Absoluta implica que:", options: ["A) A criança deve esperar sua vez.", "B) Crianças e adolescentes têm preferência em serviços públicos e formulação de políticas.", "C) Idosos vêm antes de crianças sempre.", "D) Apenas crianças ricas têm prioridade.", "E) A escola não é prioritária."], correct: 1, explanation: "Gabarito: B. Art 4º do ECA. Primazia de receber proteção e socorro." },
             { id: 44, subject: "Informática", topic: "Nuvem", question: "O armazenamento em 'Nuvem' (Cloud Storage) permite:", options: ["A) Salvar arquivos apenas no HD local.", "B) Acessar arquivos de qualquer lugar via internet.", "C) Queimar o computador se chover.", "D) Aumentar a velocidade do processador.", "E) Usar o computador sem monitor."], correct: 1, explanation: "Gabarito: B. Exemplos: Google Drive, OneDrive." },
             { id: 45, subject: "Raciocínio Lógico", topic: "Equivalência", question: "A equivalência da frase 'Se estudo, passo' é:", options: ["A) Se não estudo, não passo.", "B) Se passo, estudo.", "C) Se não passo, não estudo.", "D) Estudo e passo.", "E) Estudo ou não passo."], correct: 2, explanation: "Gabarito: C. Contrapositiva: Se A então B = Se não B então não A." },
             { id: 46, subject: "Administração", topic: "Motivação", question: "A Teoria de Maslow organiza as necessidades humanas em uma:", options: ["A) Roda.", "B) Tabela periódica.", "C) Pirâmide.", "D) Linha reta.", "E) Espiral."], correct: 2, explanation: "Gabarito: C. A Pirâmide de Maslow vai das necessidades fisiológicas às de autorrealização." },
             { id: 47, subject: "Administração", topic: "Controle", question: "O controle que ocorre DEPOIS da ação para verificar os resultados é chamado de:", options: ["A) Preventivo.", "B) Concomitante.", "C) Corretivo ou a posteriori.", "D) Prévio.", "E) Imaginário."], correct: 2, explanation: "Gabarito: C. O controle a posteriori avalia o que já foi feito." },
             { id: 48, subject: "Direito Administrativo", topic: "Responsabilidade Civil", question: "A responsabilidade civil do Estado no Brasil é, via de regra:", options: ["A) Subjetiva (depende de culpa).", "B) Objetiva (independe de culpa).", "C) Inexistente.", "D) Apenas penal.", "E) Limitada ao salário do servidor."], correct: 1, explanation: "Gabarito: B. Art 37 §6º da CF. Teoria do Risco Administrativo." },
             { id: 49, subject: "Políticas Educacionais", topic: "Fundeb", question: "O FUNDEB é um fundo destinado:", options: ["A) Ao ensino superior apenas.", "B) À manutenção e desenvolvimento da educação básica e valorização dos profissionais.", "C) A pagar aposentadorias.", "D) A construir estradas.", "E) A financiar escolas privadas."], correct: 1, explanation: "Gabarito: B. Fundo fundamental para o financiamento da educação básica pública." },
             { id: 50, subject: "Administração", topic: "SWOT", question: "Na análise SWOT, as 'Oportunidades' e 'Ameaças' referem-se ao ambiente:", options: ["A) Interno.", "B) Externo.", "C) Pessoal.", "D) Financeiro apenas.", "E) Da diretoria."], correct: 1, explanation: "Gabarito: B. Forças/Fraquezas = Interno. Oportunidades/Ameaças = Externo." },
             // Adicionando as ultimas 10 para fechar 60 com variedade
             { id: 51, subject: "Informática", topic: "Excel", question: "No Excel, para somar as células A1 e A2, usamos:", options: ["A) =SOMA(A1;A2)", "B) =SOMA(A1+A2)", "C) SOMA(A1:A2)", "D) =CALC(A1,A2)", "E) =ADD(A1:A2)"], correct: 0, explanation: "Gabarito: A. =SOMA(A1:A2) (intervalo) ou =SOMA(A1;A2) (valores individuais)." },
             { id: 52, subject: "Raciocínio Lógico", topic: "Negação E/OU", question: "A negação de 'João canta E dança' é:", options: ["A) João não canta E não dança.", "B) João não canta OU não dança.", "C) João canta mas não dança.", "D) João dança e não canta.", "E) João para de cantar."], correct: 1, explanation: "Gabarito: B. Leis de De Morgan. Negação do E vira OU e nega as duas partes." },
             { id: 53, subject: "Administração", topic: "PDCA", question: "O ciclo PDCA significa:", options: ["A) Planejar, Desistir, Chorar, Aceitar.", "B) Plan, Do, Check, Act (Planejar, Fazer, Checar, Agir).", "C) Pedir, Dar, Cobrar, Agradecer.", "D) Pensar, Dizer, Comer, Andar.", "E) Programar, Demitir, Contratar, Analisar."], correct: 1, explanation: "Gabarito: B. Ferramenta de melhoria contínua." },
             { id: 54, subject: "Direito Administrativo", topic: "Improbidade", question: "Enriquecimento ilícito é um ato de improbidade administrativa que:", options: ["A) Causa apenas prejuízo ao erário.", "B) Atenta contra os princípios.", "C) Importa aferição de vantagem patrimonial indevida.", "D) Não é punido.", "E) É elogiado."], correct: 2, explanation: "Gabarito: C. Lei 8.429/92." },
             { id: 55, subject: "Contextual", topic: "Cultura", question: "A diversidade cultural brasileira é resultado:", options: ["A) De um processo pacífico.", "B) Da miscigenação de indígenas, europeus, africanos e asiáticos.", "C) Apenas da influência americana.", "D) Do isolamento geográfico.", "E) De decreto lei."], correct: 1, explanation: "Gabarito: B. Base da formação do povo brasileiro." },
             { id: 56, subject: "Português", topic: "Funções da Linguagem", question: "Na frase 'Alô? Está me ouvindo?', a função da linguagem predominante é:", options: ["A) Metalinguística.", "B) Fática.", "C) Poética.", "D) Referencial.", "E) Emotiva."], correct: 1, explanation: "Gabarito: B. Função Fática testa o canal de comunicação." },
             { id: 57, subject: "Administração", topic: "Liderança", question: "A liderança democrática se caracteriza por:", options: ["A) O líder toma decisões sozinho.", "B) O líder deixa o grupo solto sem direção (Laissez-faire).", "C) O líder incentiva a participação do grupo nas decisões.", "D) O líder usa apenas punições.", "E) O líder não aparece."], correct: 2, explanation: "Gabarito: C. Estilo participativo." },
             { id: 58, subject: "Informática", topic: "Hardware", question: "Qual destes componentes é considerado o 'cérebro' do computador?", options: ["A) HD.", "B) Memória RAM.", "C) Processador (CPU).", "D) Fonte.", "E) Mouse."], correct: 2, explanation: "Gabarito: C. A CPU realiza o processamento dos dados." },
             { id: 59, subject: "Raciocínio Lógico", topic: "Probabilidade", question: "Ao lançar uma moeda honesta, a chance de sair 'cara' é:", options: ["A) 10%", "B) 25%", "C) 50%", "D) 75%", "E) 100%"], correct: 2, explanation: "Gabarito: C. 1 em 2 possibilidades." },
             { id: 60, subject: "Administração", topic: "Eficiência vs Eficácia", question: "Eficácia está relacionada a:", options: ["A) Uso racional dos recursos (custos).", "B) Atingir os objetivos e metas previstos.", "C) Trabalhar rápido.", "D) Gastar pouco.", "E) Seguir as regras."], correct: 1, explanation: "Gabarito: B. Eficiência = fazer certo (meios). Eficácia = fazer a coisa certa (fins/resultados)." },
        ];

        // --- COMPONENTES DA APLICAÇÃO ---

        function App() {
            const [view, setView] = useState('dashboard'); // dashboard, quiz
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState({}); // { 1: 0, 2: 3 } (questionId: optionIndex)
            const [history, setHistory] = useState([]);
            const [importText, setImportText] = useState("");
            const [showFeedback, setShowFeedback] = useState(false);
            
            // Estado derivado para progresso atual
            const currentSessionStats = useMemo(() => {
                let correct = 0;
                let answered = 0;
                Object.keys(userAnswers).forEach(qId => {
                    const q = questionsDb.find(i => i.id === parseInt(qId));
                    if (q) {
                        answered++;
                        if (userAnswers[qId] === q.correct) correct++;
                    }
                });
                return { correct, answered, total: questionsDb.length };
            }, [userAnswers]);

            // Funções de Ação
            const handleAnswer = (optionIndex) => {
                if (showFeedback) return; // Trava se já respondeu
                
                setUserAnswers(prev => ({
                    ...prev,
                    [questionsDb[currentQIndex].id]: optionIndex
                }));
                setShowFeedback(true);
            };

            const nextQuestion = () => {
                setShowFeedback(false);
                if (currentQIndex < questionsDb.length - 1) {
                    setCurrentQIndex(prev => prev + 1);
                } else {
                    finishSession();
                }
            };
            
            const finishSession = () => {
                const newHistoryItem = {
                    date: new Date().toLocaleDateString(),
                    score: currentSessionStats.correct,
                    total: currentSessionStats.answered,
                    details: userAnswers // Salva detalhes se quiser analisar depois
                };
                const newHistory = [...history, newHistoryItem];
                setHistory(newHistory);
                setView('dashboard');
                // Opcional: Limpar sessão atual ou manter para revisão
            };

            const handleImport = () => {
                try {
                    const data = JSON.parse(importText);
                    if (Array.isArray(data)) {
                        setHistory(data);
                        alert("Histórico importado com sucesso!");
                    } else {
                        alert("Formato inválido.");
                    }
                } catch (e) {
                    alert("Erro ao ler JSON.");
                }
            };
            
            const handleExport = () => {
                const dataStr = JSON.stringify(history);
                navigator.clipboard.writeText(dataStr);
                alert("Dados copiados para a área de transferência! Salve em um bloco de notas.");
            };

            const resetQuiz = () => {
                setUserAnswers({});
                setCurrentQIndex(0);
                setShowFeedback(false);
                setView('quiz');
            };

            // Análise SWOT
            const swotAnalysis = useMemo(() => {
                const statsBySubject = {};
                
                // Analisa TODO o histórico + Sessão atual (se quiser, ou só histórico)
                // Vamos analisar o histórico acumulado para ser mais robusto
                const allAnswers = [...history.map(h => h.details || {}), userAnswers];
                
                // Itera sobre todas as questões do banco para ver se foram respondidas
                questionsDb.forEach(q => {
                    let correctCount = 0;
                    let attemptCount = 0;
                    
                    allAnswers.forEach(sessionAns => {
                        if (sessionAns[q.id] !== undefined) {
                            attemptCount++;
                            if (sessionAns[q.id] === q.correct) correctCount++;
                        }
                    });

                    if (attemptCount > 0) {
                        if (!statsBySubject[q.subject]) statsBySubject[q.subject] = { correct: 0, total: 0 };
                        statsBySubject[q.subject].correct += correctCount;
                        statsBySubject[q.subject].total += attemptCount;
                    }
                });

                const strengths = [];
                const weaknesses = [];

                Object.keys(statsBySubject).forEach(sub => {
                    const pct = (statsBySubject[sub].correct / statsBySubject[sub].total) * 100;
                    if (pct >= 80) strengths.push(`${sub} (${pct.toFixed(0)}%)`);
                    if (pct < 60) weaknesses.push(`${sub} (${pct.toFixed(0)}%)`);
                });

                return { strengths, weaknesses };
            }, [history, userAnswers]);

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    {/* Sidebar */}
                    <div className="w-full md:w-64 bg-slate-900 text-white p-6 flex flex-col justify-between">
                        <div>
                            <h1 className="text-2xl font-bold mb-2 text-blue-400">IBFC Simulator</h1>
                            <p className="text-xs text-slate-400 mb-8">SEC/BA - Técnico Adm.</p>
                            
                            <nav className="space-y-4">
                                <button onClick={() => setView('dashboard')} className={`flex items-center space-x-2 w-full p-2 rounded ${view === 'dashboard' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>
                                    <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
                                </button>
                                <button onClick={() => setView('quiz')} className={`flex items-center space-x-2 w-full p-2 rounded ${view === 'quiz' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>
                                    <i data-lucide="pen-tool"></i> <span>Treinar</span>
                                </button>
                            </nav>
                        </div>

                        <div className="mt-8 pt-8 border-t border-slate-700">
                             <h3 className="text-xs font-bold uppercase text-slate-500 mb-2">Persistência</h3>
                             <button onClick={handleExport} className="text-sm flex items-center gap-2 text-green-400 hover:text-green-300 mb-2">
                                <i data-lucide="download"></i> Salvar Progresso
                             </button>
                             <div className="text-xs">
                                <input 
                                    className="w-full bg-slate-800 p-1 rounded mb-1 text-white" 
                                    placeholder="Cole o código aqui..."
                                    value={importText}
                                    onChange={(e) => setImportText(e.target.value)}
                                />
                                <button onClick={handleImport} className="w-full bg-slate-700 hover:bg-slate-600 py-1 rounded text-xs">Carregar</button>
                             </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto">
                        
                        {view === 'dashboard' && (
                            <div className="max-w-4xl mx-auto animate-fadeIn">
                                <header className="mb-8">
                                    <h2 className="text-3xl font-bold text-slate-800">Painel de Desempenho</h2>
                                    <p className="text-slate-500">Acompanhe sua evolução diária.</p>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                    {/* Card 1: Geral */}
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                        <h3 className="text-sm font-semibold text-slate-400 uppercase">Questões Realizadas</h3>
                                        <p className="text-4xl font-bold text-slate-800 mt-2">
                                            {history.reduce((acc, curr) => acc + curr.total, 0) + currentSessionStats.answered}
                                        </p>
                                    </div>
                                    
                                    {/* Card 2: SWOT Strengths */}
                                    <div className="bg-green-50 p-6 rounded-xl shadow-sm border border-green-100">
                                        <h3 className="text-sm font-semibold text-green-600 uppercase flex items-center gap-2">
                                            <i data-lucide="trending-up" size={16}></i> Pontos Fortes
                                        </h3>
                                        <ul className="mt-2 text-sm text-green-800">
                                            {swotAnalysis.strengths.length > 0 ? swotAnalysis.strengths.map(s => <li key={s}>• {s}</li>) : <li>Ainda não identificados</li>}
                                        </ul>
                                    </div>

                                    {/* Card 3: SWOT Weaknesses */}
                                    <div className="bg-red-50 p-6 rounded-xl shadow-sm border border-red-100">
                                        <h3 className="text-sm font-semibold text-red-600 uppercase flex items-center gap-2">
                                            <i data-lucide="alert-circle" size={16}></i> Atenção (>60%)
                                        </h3>
                                        <ul className="mt-2 text-sm text-red-800">
                                            {swotAnalysis.weaknesses.length > 0 ? swotAnalysis.weaknesses.map(s => <li key={s}>• {s}</li>) : <li>Continue treinando!</li>}
                                        </ul>
                                    </div>
                                </div>

                                {/* Gráfico de Histórico (Simples com CSS) */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
                                    <h3 className="text-lg font-bold text-slate-700 mb-4">Histórico de Sessões</h3>
                                    {history.length === 0 ? (
                                        <div className="text-center py-10 text-slate-400 bg-slate-50 rounded-lg">
                                            Nenhum histórico salvo. Complete um simulado!
                                        </div>
                                    ) : (
                                        <div className="flex items-end space-x-2 h-48 border-b border-slate-200 pb-2">
                                            {history.map((h, i) => {
                                                const pct = h.total > 0 ? (h.score / h.total) * 100 : 0;
                                                return (
                                                    <div key={i} className="flex-1 flex flex-col items-center group relative">
                                                        <div 
                                                            className={`w-full max-w-[40px] rounded-t transition-all duration-500 ${pct >= 70 ? 'bg-green-500' : pct >= 50 ? 'bg-yellow-400' : 'bg-red-400'}`}
                                                            style={{ height: `${pct}%` }}
                                                        ></div>
                                                        <span className="text-[10px] mt-1 text-slate-500 truncate w-full text-center">{h.date}</span>
                                                        {/* Tooltip */}
                                                        <div className="absolute bottom-full mb-1 bg-black text-white text-xs p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity">
                                                            {pct.toFixed(0)}%
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    )}
                                </div>
                                
                                <div className="flex justify-center">
                                    <button onClick={resetQuiz} className="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                                        Iniciar Novo Simulado
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="max-w-3xl mx-auto">
                                {/* Header do Quiz */}
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <span className="text-xs font-bold text-blue-600 uppercase tracking-wider">{questionsDb[currentQIndex].subject}</span>
                                        <h2 className="text-slate-500 text-sm">{questionsDb[currentQIndex].topic}</h2>
                                    </div>
                                    <div className="text-right">
                                        <span className="text-2xl font-bold text-slate-800">{currentQIndex + 1}</span>
                                        <span className="text-slate-400">/{questionsDb.length}</span>
                                    </div>
                                </div>

                                {/* Barra de Progresso */}
                                <div className="w-full bg-slate-200 h-2 rounded-full mb-8">
                                    <div 
                                        className="bg-blue-600 h-2 rounded-full transition-all duration-300" 
                                        style={{ width: `${((currentQIndex + 1) / questionsDb.length) * 100}%` }}
                                    ></div>
                                </div>

                                {/* Cartão da Questão */}
                                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-slate-100 question-transition mb-6">
                                    <p className="text-lg text-slate-800 font-medium leading-relaxed mb-6">
                                        {questionsDb[currentQIndex].question}
                                    </p>

                                    <div className="space-y-3">
                                        {questionsDb[currentQIndex].options.map((option, idx) => {
                                            let btnClass = "w-full text-left p-4 rounded-lg border-2 transition-all ";
                                            
                                            if (showFeedback) {
                                                if (idx === questionsDb[currentQIndex].correct) {
                                                    btnClass += "border-green-500 bg-green-50 text-green-900 font-semibold";
                                                } else if (idx === userAnswers[questionsDb[currentQIndex].id]) {
                                                    btnClass += "border-red-400 bg-red-50 text-red-900";
                                                } else {
                                                    btnClass += "border-slate-100 text-slate-400 opacity-50";
                                                }
                                            } else {
                                                if (userAnswers[questionsDb[currentQIndex].id] === idx) {
                                                     btnClass += "border-blue-500 bg-blue-50 text-blue-900";
                                                } else {
                                                     btnClass += "border-slate-100 hover:border-blue-300 hover:bg-slate-50 text-slate-700";
                                                }
                                            }

                                            return (
                                                <button 
                                                    key={idx}
                                                    onClick={() => handleAnswer(idx)}
                                                    disabled={showFeedback}
                                                    className={btnClass}
                                                >
                                                    {option}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Gabarito Comentado */}
                                {showFeedback && (
                                    <div className="animate-fadeIn mb-8">
                                        <div className={`p-6 rounded-xl border-l-4 ${userAnswers[questionsDb[currentQIndex].id] === questionsDb[currentQIndex].correct ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                                            <h4 className="font-bold mb-2 flex items-center gap-2">
                                                {userAnswers[questionsDb[currentQIndex].id] === questionsDb[currentQIndex].correct ? 
                                                    <span className="text-green-700">Excelente! Resposta Correta.</span> : 
                                                    <span className="text-red-700">Atenção! Vamos corrigir.</span>
                                                }
                                            </h4>
                                            <p className="text-slate-700 text-sm leading-relaxed">
                                                {questionsDb[currentQIndex].explanation}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-6 flex justify-end">
                                            <button 
                                                onClick={nextQuestion}
                                                className="bg-slate-800 text-white px-6 py-3 rounded-lg font-medium hover:bg-slate-700 flex items-center gap-2"
                                            >
                                                {currentQIndex < questionsDb.length - 1 ? 'Próxima Questão' : 'Finalizar Simulado'} 
                                                <i data-lucide="arrow-right" size={18}></i>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // Renderização Inicial
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inicializa ícones após renderizar
        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
